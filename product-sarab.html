<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخمرية سراب | ليل</title>
    <link rel="icon" type="image/png" sizes="32x32" href="WebsiteIcon32px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="WebsiteIcon180px.png">
    <link rel="icon" type="image/png" sizes="192x192" href="WebsiteIcon180px.png">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); overflow-x: hidden; }

        /* تنسيقات الهيدر الأساسية */
        header { background: var(--bg); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display: block; font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; line-height: 1; }
        nav { display: flex; gap: 25px; flex-grow: 1; justify-content: center; align-items: center; }
        nav a { text-decoration: none; font-size: 14px; opacity: 0.8; transition: 0.3s; white-space: nowrap; color: white; display: inline-flex; align-items: center; }
        nav a:hover, .dropdown.active > a { opacity: 1; color: white !important; }
        .dropdown { position: relative; display: flex; align-items: center; height: 100%; }
        .dropdown-content { display: none; position: absolute; background-color: var(--bg); min-width: 160px; box-shadow: 0px 10px 20px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid rgba(255, 255, 255, 0.1); top: 100%; right: 0; border-radius: 4px; overflow: hidden; backdrop-filter: blur(15px); }
        .dropdown.active .dropdown-content { display: block; animation: fadeInSlide 0.3s ease forwards; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; text-align: right; transition: 0.3s; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: var(--main); padding-right: 20px; opacity: 1; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown > a::after { content: ' ▾'; font-size: 10px; margin-right: 4px; display: inline-block; opacity: 0.5; }
        .header-icons { display: flex; align-items: center; }
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count { position: absolute; top: -8px; left: -10px; background: var(--main); width: 18px; height: 18px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* تنسيق المنتج */
        .product-wrapper { max-width: 1200px; margin: 20px auto; display: flex; flex-wrap: wrap; gap: 40px; padding: 20px; }
        .image-section { flex: 1; min-width: 300px; max-width: 550px; width: 100%; }
        .swiper { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); }
        .swiper-slide img { width: 100%; height: auto; display: block; }
        .product-details { flex: 1; min-width: 300px; text-align: right; }
        .size-btn { padding: 12px 20px; border: 1px solid rgba(255,255,255,0.4); background: none; border-radius: 25px; cursor: pointer; color: white; }
        .active-size { background: white !important; color: black !important; border-color: white !important; }
        .out-of-stock { opacity: 0.4; border-style: dashed; cursor: not-allowed; text-decoration: line-through; }
        .add-to-cart-btn { width: 100%; padding: 16px; background: var(--main); border: none; color: white; font-weight: 700; cursor: pointer; }
        .quantity-btn-group { display: none; grid-template-columns: 1fr 2fr 1fr; width: 100%; gap: 10px; }
        .q-btn { background: #fff; color: #000; border: none; font-size: 24px; font-weight: bold; cursor: pointer; height: 55px; }
        .q-val { background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }
        .product-desc { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }

        @media (max-width: 480px) { 
            header { padding: 10px 4%; }
            .product-wrapper { flex-direction: column; }
            #lipBalmToggle .dropdown-content { right: auto !important; left: 50% !important; transform: translateX(-50%) !important; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="product-wrapper">
    <div class="image-section">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="FIMG9630WEB.webp" alt="سراب 1"></div>
                <div class="swiper-slide"><img src="Productsarab.webp" alt="سراب 2"></div>
                <div class="swiper-slide"><img src="FIMG9631WEB.webp" alt="سراب 3"></div>
                <div class="swiper-slide"><img src="FIMG9632WEB.webp" alt="سراب 4"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <div class="product-details">
        <h1>مخمرية سراب</h1>
        <span class="slogan">أثر لا يغيب</span>
        <span class="label">الحجم</span>
        <div class="size-selector">
            <button class="size-btn active-size" data-price="25" data-old="30" onclick="selectSize(this, '3 جرام')">3 جرام</button>
            <button class="size-btn out-of-stock" data-price="50" data-old="50" onclick="selectSize(this, '5 جرام')">5 جرام</button>
            <button class="size-btn" data-price="60" data-old="70" onclick="selectSize(this, '10 جرام')">10 جرام</button>
            <button class="size-btn" data-price="125" data-old="175" onclick="selectSize(this, '35 جرام')">35 جرام</button>
        </div>
        <span class="label">السعر الحالي</span>
        <div class="price-container">
            <span class="price-tag" id="main-price">25 ج.م</span>
            <span class="old-price-tag" id="old-price">30 ج.م</span>
        </div>
        <div class="cart-controls">
            <button class="add-to-cart-btn" id="add-btn" onclick="initAdd()">أضف إلى السلة</button>
            <div class="quantity-btn-group" id="qty-group">
                <button class="q-btn" onclick="changeQty(1)">+</button>
                <div class="q-val" id="current-qty">1</div>
                <button class="q-btn" onclick="changeQty(-1)">-</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
            function setupDropdown(id) {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.dropdown').forEach(d => { if(d !== el) d.classList.remove('active'); });
                        this.classList.toggle('active');
                    });
                }
            }
            setupDropdown('makhmariatToggle'); setupDropdown('splashToggle'); setupDropdown('lipBalmToggle');
            checkCartState();
        });

    document.addEventListener('click', function() { document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active')); });

    const swiper = new Swiper('.swiper', { loop: true, pagination: { el: '.swiper-pagination', clickable: true } });

    let currentProductName = "مخمرية سراب";
    let currentSelectedSize = "3 جرام";
    let currentUnitPrice = 25;
    let currentOldPrice = 30;

    function selectSize(btn, sizeName) {
        currentSelectedSize = sizeName;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active-size'));
        btn.classList.add('active-size');
        currentUnitPrice = parseInt(btn.getAttribute('data-price'));
        currentOldPrice = parseInt(btn.getAttribute('data-old'));
        
        const addBtn = document.getElementById('add-btn');
        if (sizeName === "5 جرام") {
            addBtn.innerText = "المنتج غير متاح"; addBtn.disabled = true;
        } else {
            addBtn.innerText = "أضف إلى السلة"; addBtn.disabled = false;
        }
        checkCartState();
    }

    function updateDisplayPrice(price, oldPrice) {
        document.getElementById('main-price').innerText = price + " ج.م";
        const oldPriceEl = document.getElementById('old-price');
        oldPriceEl.style.display = (price < oldPrice) ? "block" : "none";
        oldPriceEl.innerText = oldPrice + " ج.م";
    }

    function checkCartState() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const itemKey = currentProductName + " - " + currentSelectedSize;
        const addBtn = document.getElementById('add-btn');
        const qtyGroup = document.getElementById('qty-group');
        const currentQtyDisplay = document.getElementById('current-qty');

        if (cart[itemKey] && (cart[itemKey].qty || cart[itemKey]) > 0) {
            const qty = typeof cart[itemKey] === 'object' ? cart[itemKey].qty : cart[itemKey];
            addBtn.style.display = "none"; qtyGroup.style.display = "grid"; currentQtyDisplay.innerText = qty;
            updateDisplayPrice(currentUnitPrice * qty, currentOldPrice * qty);
        } else {
            addBtn.style.display = "block"; qtyGroup.style.display = "none";
            updateDisplayPrice(currentUnitPrice, currentOldPrice);
        }
        updateCartCount();
    }

    function initAdd() { changeQty(1); }

    function changeQty(amount) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const itemKey = currentProductName + " - " + currentSelectedSize;
        if (!cart[itemKey]) cart[itemKey] = { qty: 0, price: currentUnitPrice };
        if (typeof cart[itemKey] !== 'object') cart[itemKey] = { qty: cart[itemKey], price: currentUnitPrice };
        cart[itemKey].qty += amount;
        if (cart[itemKey].qty <= 0) delete cart[itemKey];
        localStorage.setItem('leilCart', JSON.stringify(cart));
        checkCartState();
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = Object.values(cart).reduce((a, b) => a + (typeof b === 'object' ? b.qty : b), 0);
        const countEl = document.getElementById('cart-count');
        if(countEl) countEl.innerText = total;
    }
</script>
</body>
</html>
