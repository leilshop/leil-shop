<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لطلبك | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { 
            background: var(--bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            overflow: hidden;
        }

        .success-animation { margin-bottom: 30px; }
        
        .checkmark-circle {
            width: 120px;
            height: 120px;
            position: relative;
            display: inline-block;
            vertical-align: top;
            border-radius: 50%;
            background-color: rgba(37, 211, 102, 0.1);
            border: 4px solid #25D366;
            animation: scale-up 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .checkmark-circle i {
            font-size: 60px;
            color: #25D366;
            line-height: 112px;
            animation: pop-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0);
        }

        @keyframes scale-up {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { font-size: 32px; margin-bottom: 15px; opacity: 0; animation: fade-up 0.6s ease 0.4s forwards; }
        p { font-size: 18px; opacity: 0; color: rgba(255,255,255,0.7); animation: fade-up 0.6s ease 0.6s forwards; }
        
        .loader-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 30px;
            overflow: hidden;
            opacity: 0;
            animation: fade-up 0.6s ease 0.8s forwards;
        }

        .loader-fill {
            height: 100%;
            background: #25D366;
            width: 0%;
            animation: loading 5s linear forwards;
        }

        @keyframes fade-up {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="success-animation">
        <div class="checkmark-circle">
            <i class="fas fa-check"></i>
        </div>
    </div>
    
    <h1>تم استلام طلبك بنجاح!</h1>
    <p>سيتم التواصل معك قريباً لتأكيد الأوردر.</p>
    
    <div class="loader-bar">
        <div class="loader-fill"></div>
    </div>
    <p style="font-size: 14px; margin-top: 15px;">جاري العودة للصفحة الرئيسية...</p>

    <script>
        // التحويل للصفحة الرئيسية بعد 5 ثواني
        setTimeout(function() {
            window.location.href = "index.html";
        }, 5000);
    </script>
</body>
</html>
