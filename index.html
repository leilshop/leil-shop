<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leil Official | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #600a1c; --bg: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif !important; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); }

        /* الشريط العلوي الاحترافي (Header) */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-size: 28px; font-weight: 700; text-decoration: none; letter-spacing: 2px; }
        
        nav { display: flex; gap: 25px; }
        nav a { text-decoration: none; font-size: 16px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: var(--main); }

        .header-icons { display: flex; align-items: center; gap: 20px; }
        
        /* أيقونة السلة الثابتة في الهيدر */
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; }
        .cart-count {
            position: absolute; -10px; -10px; background: var(--main);
            width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        /* الجزء الرئيسي (Hero Section) */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1920x1080'); /* حط رابط صورتك الكبيرة هنا */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .hero h1 { font-size: 45px; margin-bottom: 20px; letter-spacing: 5px; }
        .hero-btn {
            padding: 12px 35px; border: 1px solid white; background: none;
            color: white; text-decoration: none; font-weight: 700; transition: 0.3s;
        }
        .hero-btn:hover { background: white; color: black; }

        /* قسم المنتجات */
        .section-title { text-align: center; padding: 40px 0; font-size: 30px; }
        .container {
            max-width: 1100px; margin: auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;
        }
        
        .card { background: #111; border-radius: 5px; overflow: hidden; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: var(--main); }
        .card-img { width: 100%; height: 350px; background: #222; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .card-title { font-size: 20px; margin-bottom: 10px; color: var(--main); }
        .price { font-size: 24px; font-weight: 700; margin-bottom: 15px; display: block; }
        .btn-view {
            display: block; width: 100%; padding: 12px; background: var(--main);
            text-decoration: none; font-weight: 700; border-radius: 4px;
        }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    
    <nav>
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="product-dam.html">دم الغزال</a>
        <a href="#">سراب</a>
        <a href="#">السلة</a>
        <a href="#">تواصل معنا</a>
    </nav>

    <div class="header-icons">
        <a href="cart.html" class="cart-trigger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <div class="cart-count" id="cart-count">0</div>
        </a>
    </div>
</header>

<section class="hero">
    <h1>ليـل</h1>
    <a href="#" class="hero-btn">تواصل معنا</a>
</section>

<h2 class="section-title">منتجاتنا</h2>

<div class="container">
    <div class="card">
        <img src="https://via.placeholder.com/400x400" class="card-img" alt="دم الغزال">
        <div class="card-info">
            <h3 class="card-title">دم الغزال</h3>
            <span class="price">30 ج.م</span>
            <a href="product-dam.html" class="btn-view">عرض المنتج</a>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/400x400" class="card-img" alt="سراب">
        <div class="card-info">
            <h3 class="card-title">سراب</h3>
            <span class="price">30 ج.م</span>
            <a href="#" class="btn-view" style="background: #333;">قريباً</a>
        </div>
    </div>
</div>

<script>
    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = Object.values(cart).reduce((a, b) => a + b, 0);
        document.getElementById('cart-count').innerText = total;
    }
    window.onload = updateCartCount;
</script>

</body>
</html>
