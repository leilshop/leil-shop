<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leil | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #600a1c; --bg: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif !important; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); }
        header { padding: 40px; text-align: center; border-bottom: 1px solid var(--main); background: #000; }
        .logo { font-size: 50px; font-weight: 700; letter-spacing: 10px; text-decoration: none; }
        .container { max-width: 1200px; margin: 50px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: #111; border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--main); transform: translateY(-5px); }
        .card h2 { color: var(--main); margin: 15px 0; }
        .price { font-size: 28px; font-weight: 700; margin-bottom: 20px; display: block; }
        .btn { width: 100%; padding: 15px; background: var(--main); border: none; border-radius: 12px; cursor: pointer; font-weight: 700; text-decoration: none; display: block; }
        #cart-btn { position: fixed; bottom: 30px; left: 30px; background: white; width: 65px; height: 65px; border-radius: 50%; display: none; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; text-decoration: none; }
        #cart-count { position: absolute; top: 0; right: 0; background: var(--main); width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid white; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">LEIL</a></header>
    <div class="container">
        <div class="card">
            <h2>دم الغزال</h2>
            <span class="price">30 ج.م</span>
            <a href="product-dam.html" class="btn">عرض المنتج</a>
        </div>
        <div class="card">
            <h2>سراب</h2>
            <span class="price">30 ج.م</span>
            <button class="btn" style="background:#333">قريباً</button>
        </div>
    </div>
    <a href="cart.html" id="cart-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="#600a1c"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
        <div id="cart-count">0</div>
    </a>
    <script>
        function updateIcon() {
            let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
            let total = Object.values(cart).reduce((a, b) => a + b, 0);
            document.getElementById('cart-btn').style.display = total > 0 ? 'flex' : 'none';
            document.getElementById('cart-count').innerText = total;
        }
        window.onload = updateIcon;
    </script>
</body>
</html>
