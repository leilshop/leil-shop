<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leil Official | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #600a1c; --bg: #0a0a0a; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); }

        /* تعديل خط كلمة ليل (اللوجو) */
        .logo { 
            font-family: 'Noto Nastaliq Urdu', serif !important; 
            font-size: 24px; 
            font-weight: 400; 
            text-decoration: none; 
            padding-bottom: 10px; /* عشان الخط النستعليق بيحتاج مساحة تحت */
        }
        
        header {
            background: rgba(0, 0, 0, 0.95);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        nav { display: flex; gap: 25px; }
        nav a { text-decoration: none; font-size: 16px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: var(--main); }

        .header-icons { display: flex; align-items: center; gap: 20px; }
        
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count {
            position: absolute; top: -8px; left: -10px; background: var(--main);
            width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        /* تفتيح البانر وضبط كلمة ليل اللي في النص */
        .hero {
            height: 75vh;
            /* تم تقليل الظل جداً لتفتيح الصورة كما طلبت */
            background: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.1)), 
                        url('./LogoonIMG.webp'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 2px solid var(--main);
        }
        
        /* كلمة ليل اللي في نص الصورة */
        .hero h1 { 
            font-family: 'Noto Nastaliq Urdu', serif !important;
            font-size: 80px; 
            margin-bottom: 20px; 
            text-shadow: 0px 4px 15px rgba(0,0,0,0.8);
            font-weight: 400;
        }

        .hero-btn {
            padding: 14px 40px; border: 1px solid white; background: none;
            color: white; text-decoration: none; font-weight: 700; transition: 0.3s;
            border-radius: 2px;
            margin-top: 50px; /* زرار التواصل تحت الكلمة مباشرة */
        }
        .hero-btn:hover { background: white; color: black; }

        /* قسم المنتجات */
        .section-title { text-align: center; padding: 60px 0 30px 0; font-size: 32px; letter-spacing: 2px; }
        .container {
            max-width: 1100px; margin: auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;
        }
        
        .card { background: #111; border-radius: 0; overflow: hidden; transition: 0.4s; border: 1px solid #222; }
        .card:hover { transform: translateY(-8px); border-color: var(--main); }
        .card-img { width: 100%; height: 380px; background: #222; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }
        .card-title { font-size: 22px; margin-bottom: 12px; color: var(--main); font-weight: 700; }
        .price { font-size: 26px; font-weight: 700; margin-bottom: 20px; display: block; opacity: 0.9; }
        .btn-view {
            display: block; width: 100%; padding: 14px; background: var(--main);
            text-decoration: none; font-weight: 700; border-radius: 0; transition: 0.3s;
        }
        .btn-view:hover { filter: brightness(1.2); }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    
    <nav>
        <a href="index.html">الصفحة الرئيسية</a>
        <a href="product-dam.html">دم الغزال</a>
        <a href="#">سراب</a>
        <a href="#">تواصل معنا</a>
    </nav>

    <div class="header-icons">
        <a href="cart.html" class="cart-trigger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <div class="cart-count" id="cart-count">0</div>
        </a>
    </div>
</header>

<section class="hero">
    <h1>ليـل</h1>
    <a href="#" class="hero-btn">تواصل معنا</a>
</section>

<h2 class="section-title">منتجاتنا</h2>

<div class="container">
    <div class="card">
        <img src="dam-alghazal.webp" class="card-img" alt="دم الغزال">
        <div class="card-info">
            <h3 class="card-title">دم الغزال</h3>
            <span class="price">30 ج.م</span>
            <a href="product-dam.html" class="btn-view">عرض المنتج</a>
        </div>
    </div>

    <div class="card">
        <img src="sarab.webp" class="card-img" alt="سراب">
        <div class="card-info">
            <h3 class="card-title">سراب</h3>
            <span class="price">30 ج.م</span>
            <a href="#" class="btn-view" style="background: #333;">قريباً</a>
        </div>
    </div>
</div>

<script>
    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = Object.values(cart).reduce((a, b) => a + b, 0);
        document.getElementById('cart-count').innerText = total;
    }
    window.onload = updateCartCount;
</script>

</body>
</html>
