<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | ليل</title>

    <link rel="icon" type="image/png" sizes="32x32" href="WebsiteIcon32px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="WebsiteIcon180px.png">
    <link rel="icon" type="image/png" sizes="192x192" href="WebsiteIcon180px.png">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg-site: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        html, body { overflow-x: hidden; width: 100%; }
        body { background: var(--bg-site); }

        /* الهيدر الموحد - استدعاء خارجي */
        header { background: var(--bg-site); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display: block; font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; line-height: 1; }
        nav { display: flex; gap: 25px; flex-grow: 1; justify-content: center; align-items: center; }
        nav a { text-decoration: none; font-size: 14px; opacity: 0.8; transition: 0.3s; white-space: nowrap; color: white; display: inline-flex; align-items: center; }
        nav a:hover, .dropdown.active > a { opacity: 1; }
        .dropdown { position: relative; display: flex; align-items: center; height: 100%; }
        .dropdown-content { display: none; position: absolute; background-color: var(--bg-site); min-width: 160px; box-shadow: 0px 10px 20px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid rgba(255, 255, 255, 0.1); top: 100%; right: 0; border-radius: 4px; overflow: hidden; backdrop-filter: blur(15px); }
        .dropdown.active .dropdown-content { display: block; animation: fadeInSlide 0.3s ease forwards; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; text-align: right; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .dropdown-content a:hover { background-color: var(--main); padding-right: 20px; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown > a::after { content: ' ▾'; font-size: 10px; margin-right: 4px; opacity: 0.5; }
        .header-icons { display: flex; align-items: center; }
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count { position: absolute; top: -8px; left: -10px; background: var(--main); width: 18px; height: 18px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        /* تنسيق صفحة التواصل */
        .contact-container { padding: 60px 20px; text-align: center; }
        .contact-container h1 { margin-bottom: 40px; font-size: 32px; }
        .social-links { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .social-card { display: flex; flex-direction: column; align-items: center; padding: 30px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; width: 150px; transition: 0.3s; }
        .social-card:hover { border-color: var(--main); background: rgba(255,255,255,0.02); }
        .social-card i { font-size: 40px; margin-bottom: 15px; }
        .whatsapp { color: #25D366; }
        .instagram { color: #E1306C; }
        .facebook { color: #4267B2; }

        @media (max-width: 480px) {
            #lipBalmToggle .dropdown-content { right: auto !important; left: 50% !important; transform: translateX(-50%) !important; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="contact-container">
    <h1>تواصل معنا</h1>
    <div class="social-links">
        <a href="https://wa.me/201037322374" target="_blank" class="social-card">
            <i class="fab fa-whatsapp whatsapp"></i>
            <span>واتساب</span>
        </a>
        <a href="https://www.instagram.com/leilshop/" target="_blank" class="social-card">
            <i class="fab fa-instagram instagram"></i>
            <span>انستجرام</span>
        </a>
        <a href="https://www.facebook.com/share/18PxkZfTCH/" target="_blank" class="social-card">
            <i class="fab fa-facebook facebook"></i>
            <span>فيسبوك</span>
        </a>
    </div>
</div>

<script>
    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
            function setupDropdown(id) {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.dropdown').forEach(d => { if(d !== el) d.classList.remove('active'); });
                        this.classList.toggle('active');
                    });
                }
            }
            setupDropdown('makhmariatToggle'); setupDropdown('splashToggle'); setupDropdown('lipBalmToggle');
            updateCartCount();
        });

    document.addEventListener('click', function() { document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active')); });

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const countEl = document.getElementById('cart-count');
        if(countEl) countEl.innerText = Object.values(cart).reduce((a, b) => a + (typeof b === 'object' ? b.qty : b), 0);
    }
    window.onload = updateCartCount;
</script>

</body>
</html>
