<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | ليل</title>

    <link rel="icon" type="image/png" sizes="32x32" href="WebsiteIcon32px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="WebsiteIcon180px.png">
    <link rel="icon" type="image/png" sizes="192x192" href="WebsiteIcon180px.png">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

        header {
            background: var(--bg); 
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { 
            display: block; 
            font-family: 'Noto Nastaliq Urdu', serif !important; 
            font-size: 22px; 
            text-decoration: none; 
            color: white;
            line-height: 1;
        }

        nav { 
            display: flex; 
            gap: 25px; 
            flex-grow: 1; 
            justify-content: center; 
            align-items: center; 
        }
        
        nav a { 
            text-decoration: none; 
            font-size: 14px; 
            opacity: 0.8; 
            transition: 0.3s; 
            white-space: nowrap; 
            color: white;
            line-height: 1.2;
            display: flex;
            align-items: center;
        }

        nav a:hover, .dropdown.active > a { opacity: 1; color: white !important; }

        .dropdown { position: relative; display: flex; align-items: center; height: 100%; }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: var(--bg);
            min-width: 160px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.6);
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            top: 100%;
            right: 0; 
            border-radius: 4px;
            overflow: hidden;
            backdrop-filter: blur(15px);
        }

        .dropdown.active .dropdown-content {
            display: block;
            animation: fadeInSlide 0.3s ease forwards;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 13px;
            text-align: right;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: var(--main); padding-right: 20px; opacity: 1; color: white !important; }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown > a::after {
            content: ' ▾';
            font-size: 10px;
            margin-right: 4px;
            display: inline-block;
            opacity: 0.5;
        }

        .header-icons { display: flex; align-items: center; }
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count {
            position: absolute; top: -8px; left: -10px; background: var(--main);
            width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .contact-container h1 { font-size: 35px; margin-bottom: 40px; font-weight: 700; }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .social-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-card:hover {
            background: var(--main);
            transform: translateY(-5px);
            border-color: var(--main);
        }

        .social-card i { font-size: 40px; }
        .social-card span { font-size: 18px; font-weight: 700; }

        .whatsapp { color: #25D366; }
        .instagram { color: #E4405F; }
        .facebook { color: #1877F2; }
        .social-card:hover i, .social-card:hover span { color: white; }

        @media (max-width: 480px) {
            header { padding: 10px 4%; }
            nav { gap: 15px; } 
            nav a { font-size: 12px; display: flex; align-items: center; }
            .logo { font-size: 18px; }
            .contact-container h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <nav>
        <a href="index.html">الرئيسية</a>
        
        <div class="dropdown" id="splashToggle">
            <a href="javascript:void(0)">بادي سبلاش</a>
            <div class="dropdown-content">
                <a href="splash-d.html">دم الغزال</a>
                <a href="splash-s.html">سراب</a>
            </div>
        </div>

        <div class="dropdown" id="makhmariatToggle">
            <a href="javascript:void(0)">مخمريات</a>
            <div class="dropdown-content">
                <a href="product-dam.html">دم الغزال</a>
                <a href="product-sarab.html">سراب</a>
            </div>
        </div>

        <a href="contact.html">تواصل معنا</a>
    </nav>
    <div class="header-icons">
        <a href="cart.html" class="cart-trigger">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <div class="cart-count" id="cart-count">0</div>
        </a>
    </div>
</header>

<div class="contact-container">
    <h1>تواصل معنا</h1>

    <div class="social-links">
        <a href="https://wa.me/201037322374" target="_blank" class="social-card">
            <i class="fab fa-whatsapp whatsapp"></i>
            <span>واتساب</span>
        </a>

        <a href="https://www.instagram.com/leilshop/" target="_blank" class="social-card">
            <i class="fab fa-instagram instagram"></i>
            <span>انستجرام</span>
        </a>

        <a href="https://www.facebook.com/share/18PxkZfTCH/" target="_blank" class="social-card">
            <i class="fab fa-facebook facebook"></i>
            <span>فيسبوك</span>
        </a>
    </div>
</div>

<script>
    // --- دالة تشغيل القوائم المنسدلة ---
    function setupDropdown(id) {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener('click', function(e) {
                e.stopPropagation();
                document.querySelectorAll('.dropdown').forEach(d => {
                    if(d !== el) d.classList.remove('active');
                });
                this.classList.toggle('active');
            });
        }
    }
    setupDropdown('makhmariatToggle');
    setupDropdown('splashToggle');
    document.addEventListener('click', function() {
        document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
    });

    // تحديث عدد السلة
    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = Object.values(cart).reduce((a, b) => {
            const q = typeof b === 'object' ? b.qty : b;
            return a + q;
        }, 0);
        const countEl = document.getElementById('cart-count');
        if(countEl) countEl.innerText = total;
    }
    window.onload = updateCartCount;
</script>

</body>
</html>
