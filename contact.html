<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل معنا | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }

        header {
            background: var(--bg); 
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; }
        nav { display: flex; gap: 20px; }
        nav a { text-decoration: none; font-size: 14px; opacity: 0.8; transition: 0.3s; }
        nav a:hover { opacity: 1; color: var(--main); }

        .contact-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .contact-container h1 { font-size: 35px; margin-bottom: 10px; font-weight: 700; }
        .contact-container p { opacity: 0.7; margin-bottom: 40px; font-size: 18px; }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }

        .social-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .social-card:hover {
            background: var(--main);
            transform: translateY(-5px);
            border-color: var(--main);
        }

        .social-card i { font-size: 40px; }
        .social-card span { font-size: 18px; font-weight: 700; }

        .whatsapp { color: #25D366; }
        .instagram { color: #E4405F; }
        .facebook { color: #1877F2; }
        .social-card:hover i, .social-card:hover span { color: white; }

        @media (max-width: 600px) {
            .contact-container h1 { font-size: 28px; }
            nav { display: none; } /* إخفاء القائمة في الموبايل لتبسيط التواصل */
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="product-dam.html">دم الغزال</a>
        <a href="product-sarab.html">سراب</a>
        <a href="contact.html">تواصل معنا</a>
    </nav>
</header>

<div class="contact-container">
    <h1>تواصل معنا</h1>

    <div class="social-links">
        <a href="https://wa.me/201037322374" target="_blank" class="social-card">
            <i class="fab fa-whatsapp whatsapp"></i>
            <span>واتساب</span>
        </a>

        <a href="https://www.instagram.com/leilshop/" target="_blank" class="social-card">
            <i class="fab fa-instagram instagram"></i>
            <span>انستجرام</span>
        </a>

        <a href="https://www.facebook.com/share/18PxkZfTCH/" target="_blank" class="social-card">
            <i class="fab fa-facebook facebook"></i>
            <span>فيسبوك</span>
        </a>
    </div>
</div>

</body>
</html>
