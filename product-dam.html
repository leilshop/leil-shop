<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دم الغزال | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --main: #600a1c; 
            --bg-site: #3d0000; 
        }

        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg-site); }

        /* الهيدر ثابت */
        header {
            background: var(--bg-site); 
            padding: 15px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { 
            display: block; 
            font-family: 'Noto Nastaliq Urdu', serif !important; 
            font-size: 22px; 
            text-decoration: none; 
            color: white;
        }

        /* حاوية المنتج */
        .product-page {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* تقسيم الصفحة نصين */
            gap: 50px;
            align-items: start;
        }

        .product-image-side img {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-info-side {
            padding-top: 20px;
        }

        .product-info-side h1 {
            font-family: 'Noto Nastaliq Urdu', serif !important;
            font-size: 50px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .product-info-side .subtitle {
            font-size: 18px;
            opacity: 0.8;
            margin-bottom: 30px;
            display: block;
        }

        .price-box {
            margin-bottom: 30px;
        }

        .price-box .starts-from {
            font-size: 14px;
            opacity: 0.6;
            display: block;
        }

        .price-box .amount {
            font-size: 35px;
            font-weight: 700;
        }

        .description {
            line-height: 1.8;
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        /* زرار الشراء */
        .buy-now-btn {
            display: inline-block;
            background: var(--main);
            padding: 15px 40px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
            text-align: center;
        }

        .buy-now-btn:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            margin-top: 30px;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
        }

        /* ضبط الموبايل */
        @media (max-width: 768px) {
            .product-page {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .product-info-side h1 { font-size: 40px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <div style="font-size: 14px; opacity: 0.7;">تفاصيل المنتج</div>
</header>

<main class="product-page">
    <div class="product-image-side">
        <img src="FIMG9626WEB.webp" alt="دم الغزال">
    </div>

    <div class="product-info-side">
        <h1>دم الغزال</h1>
        <span class="subtitle">أثر لا يغيب</span>

        <div class="price-box">
            <span class="starts-from">يبدأ من</span>
            <span class="amount">30 ج.م</span>
        </div>

        <div class="description">
            <p>مخمرية "دم الغزال" من ليل، تتميز بتركيبتها الفريدة التي تمنحك ثباتاً يدوم طويلاً وعطراً فواحاً يملأ المكان. صُممت لتناسب ذوقك الرفيع وتترك خلفك أثراً لا ينسى.</p>
        </div>

        <a href="https://wa.me/201234567890" target="_blank" class="buy-now-btn">طلب المنتج عبر واتساب</a>
        
        <a href="index.html" class="back-link">← العودة للرئيسية</a>
    </div>
</main>

</body>
</html>
