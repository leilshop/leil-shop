<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخمرية دم الغزال | ليل</title>
    <link rel="icon" type="image/png" sizes="32x32" href="WebsiteIcon32px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="WebsiteIcon180px.png">
    <link rel="icon" type="image/png" sizes="192x192" href="WebsiteIcon180px.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); overflow-x: hidden; }

        .product-wrapper { max-width: 1200px; margin: 20px auto; display: flex; flex-wrap: wrap; gap: 40px; padding: 20px; }
        .image-section { flex: 1; min-width: 300px; max-width: 550px; width: 100%; }
        .swiper { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); }
        .swiper-slide img { width: 100%; height: auto; display: block; }
        .swiper-pagination-bullet-active { background: var(--main) !important; }

        .product-details { flex: 1; min-width: 300px; text-align: right; }
        .product-details h1 { font-size: 28px; margin-bottom: 5px; font-weight: 700; }
        .slogan { font-size: 18px; opacity: 0.7; margin-bottom: 30px; display: block; }
        .label { font-size: 13px; opacity: 0.6; margin-bottom: 10px; display: block; }

        .size-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .size-btn, .pinky-btn { padding: 12px 20px; border: 1px solid rgba(255,255,255,0.4); background: none; border-radius: 25px; cursor: pointer; transition: 0.3s; font-size: 14px; color: white; }
        .pinky-btn { border-radius: 50px; padding: 12px 25px; }
        .active-size { background: white !important; color: black !important; border-color: white !important; }
        .out-of-stock { opacity: 0.4; border-style: dashed; cursor: pointer; text-decoration: line-through; }

        .price-container { margin-bottom: 30px; display: flex; align-items: baseline; gap: 15px; }
        .price-tag { font-size: 35px; font-weight: 700; display: block; }
        .old-price-tag { font-size: 20px; text-decoration: line-through; opacity: 0.5; font-weight: 400; }

        .cart-controls { margin-bottom: 40px; }
        .add-to-cart-btn { width: 100%; padding: 16px; background: var(--main); border: none; color: white; font-weight: 700; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .add-to-cart-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }

        .quantity-btn-group { display: none; grid-template-columns: 1fr 2fr 1fr; width: 100%; gap: 10px; }
        .q-btn { background: #fff; color: #000; border: none; font-size: 24px; font-weight: bold; cursor: pointer; height: 55px; display: flex; align-items: center; justify-content: center; }
        .q-val { background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; }

        .product-desc { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .product-desc p { line-height: 1.8; opacity: 0.8; font-size: 15px; white-space: pre-line; }

        @media (max-width: 480px) { .product-wrapper { flex-direction: column; } }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="product-wrapper">
    <div class="image-section">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="FIMG9622WEB.webp" alt="دم الغزال 1"></div>
                <div class="swiper-slide"><img src="Productdam.webp" alt="دم الغزال 2"></div>
                <div class="swiper-slide"><img src="FIMG9626WEB.webp" alt="دم الغزال 3"></div>
                <div class="swiper-slide"><img src="FIMG9629WEB.webp" alt="دم الغزال 4"></div>
                <div class="swiper-slide"><img src="FIMG9693WEB.webp" alt="دم الغزال 5"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>

    <div class="product-details">
        <h1>مخمرية دم الغزال</h1>
        <span class="slogan">عطر من الخيال</span>
        <span class="label">الحجم</span>
        <div class="size-selector">
            <button class="size-btn active-size" data-price="25" data-old="30" onclick="selectSize(this, '3 جرام', 0)">3 جرام</button>
            <button class="size-btn out-of-stock" data-price="50" data-old="50" onclick="selectSize(this, '5 جرام', 0)">5 جرام</button>
            <button class="size-btn" data-price="60" data-old="70" onclick="selectSize(this, '10 جرام', 0)">10 جرام</button>
            <button class="pinky-btn" data-price="70" data-old="80" onclick="selectSize(this, '10 جرام Pinky Edition', 4)">10 جرام Pinky Edition</button>
            <button class="size-btn" data-price="125" data-old="175" onclick="selectSize(this, '35 جرام', 0)">35 جرام</button>
        </div>
        <span class="label">السعر الحالي</span>
        <div class="price-container">
            <span class="price-tag" id="main-price">25 ج.م</span>
            <span class="old-price-tag" id="old-price">30 ج.م</span>
        </div>
        <div class="cart-controls">
            <button class="add-to-cart-btn" id="add-btn" onclick="initAdd()">أضف إلى السلة</button>
            <div class="quantity-btn-group" id="qty-group">
                <button class="q-btn" onclick="changeQty(1)">+</button>
                <div class="q-val" id="current-qty">1</div>
                <button class="q-btn" onclick="changeQty(-1)">-</button>
            </div>
        </div>
        <div class="product-desc">
            <h3>وصف المنتج:</h3>
            <p>مزيج ساحر يجمع بين طهارة المسك الأبيض وعبير الفراولة المخملي. صُممت هذه المخمرية لنظافة وانتعاش يدوم طويلاً. ريحة "بناتى" رقيقة، مبهجة، وتخطف القلب من أول لمسة.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    fetch('header.html').then(r => r.text()).then(data => {
        document.getElementById('header-container').innerHTML = data;
        if(typeof updateHeaderCart === 'function') updateHeaderCart();
    });

    const swiper = new Swiper('.swiper', { loop: false, speed: 400, pagination: { el: '.swiper-pagination', clickable: true } });

    let currentProductName = "مخمرية دم الغزال";
    let currentSelectedSize = "3 جرام";
    let currentUnitPrice = 25;
    let currentOldPrice = 30;

    function selectSize(btn, sizeName, imgIndex) {
        currentSelectedSize = sizeName;
        document.querySelectorAll('.size-btn, .pinky-btn').forEach(b => b.classList.remove('active-size'));
        btn.classList.add('active-size');
        currentUnitPrice = parseInt(btn.getAttribute('data-price'));
        currentOldPrice = parseInt(btn.getAttribute('data-old'));
        if (typeof imgIndex !== 'undefined') swiper.slideTo(imgIndex, 400, true);
        const addBtn = document.getElementById('add-btn');
        if (sizeName === "5 جرام") { addBtn.innerText = "المنتج غير متاح"; addBtn.disabled = true; } 
        else { addBtn.innerText = "أضف إلى السلة"; addBtn.disabled = false; }
        checkCartState();
    }

    function checkCartState() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const itemKey = currentProductName + " - " + currentSelectedSize;
        const q = cart[itemKey] ? (typeof cart[itemKey] === 'object' ? cart[itemKey].qty : cart[itemKey]) : 0;
        document.getElementById('add-btn').style.display = q > 0 ? "none" : "block";
        document.getElementById('qty-group').style.display = q > 0 ? "grid" : "none";
        if(q > 0) document.getElementById('current-qty').innerText = q;
        document.getElementById('main-price').innerText = (currentUnitPrice * (q || 1)) + " ج.م";
        document.getElementById('old-price').innerText = (currentOldPrice * (q || 1)) + " ج.م";
        updateHeaderCart();
    }

    function initAdd() { changeQty(1); }
function changeQty(amount) {
    let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
    // المفتاح هنا بقى بياخد اسم المنتج + الحجم عشان يبقى فريد لكل قطعة
    const itemKey = currentProductName + " - " + currentSelectedSize;
    
    // صورة المنتج من السلايدر النشط حالياً
    let activeImg = document.querySelector('.swiper-slide-active img')?.getAttribute('src') || document.querySelector('.image-section img')?.getAttribute('src') || "";

    // لو المنتج مش موجود، بننشئه
    if (!cart[itemKey]) {
        cart[itemKey] = { 
            qty: 0, 
            price: currentUnitPrice, 
            img: activeImg, 
            displayName: currentProductName + " (" + currentSelectedSize + ")" 
        };
    }
    
    cart[itemKey].qty += amount;
    
    // لو الكمية وصلت لصفر، بنمسح المنتج ده بس من السلة
    if (cart[itemKey].qty <= 0) delete cart[itemKey];
    
    localStorage.setItem('leilCart', JSON.stringify(cart));
    checkCartState();
}
    function updateHeaderCart() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const countEl = document.getElementById('cart-count');
        if(countEl) countEl.innerText = Object.values(cart).reduce((a, b) => a + (typeof b === 'object' ? b.qty : b), 0);
    }
    window.onload = checkCartState;
</script>
</body>
</html>
