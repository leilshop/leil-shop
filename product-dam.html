<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دم الغزال | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); }

        header {
            background: var(--bg); 
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 24px; text-decoration: none; color: white; }
        
        .header-icons { display: flex; align-items: center; }
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count {
            position: absolute; top: -10px; right: -12px; background: var(--main);
            width: 20px; height: 20px; border-radius: 50%; font-size: 12px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        .product-wrapper {
            max-width: 1100px; margin: 40px auto;
            display: flex; flex-wrap: wrap; gap: 40px; padding: 20px;
        }

        .product-image { flex: 1; min-width: 300px; }
        .product-image img { width: 100%; border: 1px solid rgba(255,255,255,0.1); }

        .product-details { flex: 1; min-width: 300px; text-align: right; }
        .product-details h1 { font-size: 40px; margin-bottom: 5px; font-weight: 700; }
        .slogan { font-size: 18px; opacity: 0.7; margin-bottom: 30px; display: block; }

        .label { font-size: 13px; opacity: 0.6; margin-bottom: 10px; display: block; }

        /* تنسيق الأحجام المطور */
        .size-selector { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; align-items: center; }
        
        .size-btn {
            padding: 8px 18px; border: 1px solid rgba(255,255,255,0.4);
            background: none; border-radius: 25px; cursor: pointer; transition: 0.3s;
            font-size: 14px; color: white;
        }
        .size-btn.active { background: white; color: black; border-color: white; }
        
        /* شكل الـ 5 جرام غير المتوفر */
        .size-btn.out-of-stock {
            opacity: 0.3;
            border-style: dashed;
            cursor: not-allowed;
            position: relative;
        }
        .size-btn.out-of-stock::after {
            content: ""; position: absolute; top: 50%; left: 0; width: 100%;
            height: 1px; background: rgba(255,255,255,0.5); transform: rotate(-15deg);
        }

        /* تصميم Pinky Edition المخصص */
        .pinky-btn {
            padding: 10px 25px;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 50px;
            font-size: 15px;
            background: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .pinky-btn.active { background: white; color: black; }

        .price-tag { font-size: 35px; font-weight: 700; margin-bottom: 30px; display: block; }

        .add-to-cart-btn {
            width: 100%; padding: 16px; background: var(--main);
            border: none; color: white; font-weight: 700; font-size: 18px;
            cursor: pointer; transition: 0.3s; margin-bottom: 40px;
        }
        .add-to-cart-btn:hover { filter: brightness(1.2); }

        .product-desc { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .product-desc h3 { margin-bottom: 15px; font-size: 20px; }
        .product-desc p { line-height: 1.8; opacity: 0.8; font-size: 15px; }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <div class="header-icons">
        <a href="cart.html" class="cart-trigger">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <div class="cart-count" id="cart-count">0</div>
        </a>
    </div>
</header>

<div class="product-wrapper">
    <div class="product-image">
        <img src="FIMG9626WEB.webp" alt="دم الغزال">
    </div>

    <div class="product-details">
        <h1>دم الغزال</h1>
        <span class="slogan">أثر لا يغيب</span>

        <span class="label">الحجم</span>
        <div class="size-selector">
            <button class="pinky-btn" onclick="selectSize(this)">Pinky Edition جرام 10</button>
            <button class="size-btn" onclick="selectSize(this)">10 جرام</button>
            <button class="size-btn out-of-stock" disabled>5 جرام</button>
            <button class="size-btn active" onclick="selectSize(this)">3 جرام</button>
        </div>

        <span class="label">السعر</span>
        <span class="price-tag">30 ج.م</span>

        <button class="add-to-cart-btn" onclick="addToCart('دم الغزال')">أضف إلى السلة</button>

        <div class="product-desc">
            <h3>وصف المنتج</h3>
            <p>مخمرية "دم الغزال" بتركيبتها الفريدة التي تمنحك ثباتاً خرافياً ونعومة فائقة.
            ريحة تعبر عن الأنوثة والنظافة، وتدوم معكِ على الجسم والشعر لأيام.</p>
        </div>
    </div>
</div>

<script>
    // وظيفة التنقل بين الأحجام
    function selectSize(btn) {
        // حذف حالة النشاط من كل الزراير
        document.querySelectorAll('.size-btn, .pinky-btn').forEach(b => b.classList.remove('active'));
        // إضافة حالة النشاط للزرار المختار
        btn.classList.add('active');
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = Object.values(cart).reduce((a, b) => a + b, 0);
        document.getElementById('cart-count').innerText = total;
    }

    function addToCart(productName) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        cart[productName] = (cart[productName] || 0) + 1;
        localStorage.setItem('leilCart', JSON.stringify(cart));
        updateCartCount();
        alert('تمت إضافة المنتج للسلة');
    }

    window.onload = updateCartCount;
</script>

</body>
</html>
