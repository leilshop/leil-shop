<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | ليل</title>
    <link rel="icon" type="image/png" sizes="32x32" href="WebsiteIcon32px.png">
    <link rel="apple-touch-icon" sizes="180x180" href="WebsiteIcon180px.png">
    <link rel="icon" type="image/png" sizes="192x192" href="WebsiteIcon180px.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        html, body { overflow-x: hidden; width: 100%; }
        body { background: var(--bg); min-height: 100vh; padding-bottom: 50px; }

        header { background: var(--bg); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { display: block; font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; line-height: 1; }
        nav { display: flex; gap: 25px; flex-grow: 1; justify-content: center; align-items: center; }
        nav a { text-decoration: none; font-size: 14px; opacity: 0.8; transition: 0.3s; white-space: nowrap; color: white; display: inline-flex; align-items: center; }
        nav a:hover, .dropdown.active > a { opacity: 1; color: white !important; }
        .dropdown { position: relative; display: flex; align-items: center; height: 100%; }
        .dropdown-content { display: none; position: absolute; background-color: var(--bg); min-width: 160px; box-shadow: 0px 10px 20px rgba(0,0,0,0.6); z-index: 1000; border: 1px solid rgba(255, 255, 255, 0.1); top: 100%; right: 0; border-radius: 4px; overflow: hidden; backdrop-filter: blur(15px); }
        .dropdown.active .dropdown-content { display: block; animation: fadeInSlide 0.3s ease forwards; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 13px; text-align: right; transition: 0.3s; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: var(--main); padding-right: 20px; }
        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown > a::after { content: ' ▾'; font-size: 10px; margin-right: 4px; display: inline-block; opacity: 0.5; }
        .header-icons { display: flex; align-items: center; }
        .cart-trigger { position: relative; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .cart-count { position: absolute; top: -8px; left: -10px; background: var(--main); width: 18px; height: 18px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .cart-item { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; border-radius: 8px; }
        .item-info { display: flex; align-items: center; overflow: hidden; }
        .item-text { margin-right: 15px; min-width: 0; }
        .item-text h3 { font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
        .qty-controls { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; flex-shrink: 0; }
        .qty-btn { background: white; color: black; border: none; width: 23px; height: 23px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .qty-val { padding: 0 10px; font-weight: 700; min-width: 25px; text-align: center; font-size: 14px; }
        .checkout-form { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-top: 30px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white; text-align: right; outline: none; }
        .input-group select option { color: black; background: white; }
        .summary-details { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 5px; }
        .total-line { display: flex; justify-content: space-between; font-size: 24px; font-weight: 700; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-top: 15px; }
        .checkout-btn { display: block; width: 100%; padding: 18px; background: var(--main); color: white; font-weight: 700; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .checkout-btn:hover { background: #7a0c23; }
        
        @media (max-width: 600px) {
            #lipBalmToggle .dropdown-content { right: auto !important; left: 50% !important; transform: translateX(-50%) !important; }
        }
    </style>
</head>
<body>

<div id="header-container"></div>

<div class="cart-container">
    <h1>سلة المشتريات</h1>
    <div id="items-list"></div>

    <div class="checkout-form">
        <h3>بيانات الشحن</h3>
        <div class="input-group"><label>الاسم بالكامل</label><input type="text" id="cust_name" placeholder="أدخل اسمك" required></div>
        <div class="input-group"><label>رقم الهاتف</label><input type="tel" id="cust_phone" placeholder="أدخل رقمك" required></div>
        <div class="input-group">
            <label>المحافظة</label>
            <select id="cust_city" onchange="updateTotal()">
                <option value="30">الإسماعيلية</option>
                <option value="100">القاهرة</option>
                <option value="100">الجيزة</option>
                <option value="100">الإسكندرية</option>
                <option value="100">الدقهلية</option>
                <option value="100">البحر الأحمر</option>
                <option value="100">البحيرة</option>
                <option value="100">الفيوم</option>
                <option value="100">الغربية</option>
                <option value="100">المنوفية</option>
                <option value="100">القليوبية</option>
                <option value="100">الوادي الجديد</option>
                <option value="100">السويس</option>
                <option value="100">الشرقية</option>
                <option value="100">بورسعيد</option>
                <option value="100">دمياط</option>
                <option value="100">جنوب سيناء</option>
                <option value="100">شمال سيناء</option>
                <option value="100">كفر الشيخ</option>
                <option value="100">مطروح</option>
                <option value="100">الأقصر</option>
                <option value="100">قنا</option>
                <option value="100">بني سويف</option>
                <option value="100">سوهاج</option>
                <option value="100">المنيا</option>
                <option value="100">أسوان</option>
                <option value="100">أسيوط</option>
            </select>
        </div>
        <div class="input-group"><label>العنوان بالتفصيل</label><textarea id="cust_address" rows="2" placeholder="المنطقة، الشارع، رقم المنزل..." required></textarea></div>
        <div class="input-group"><label>كود الخصم</label><input type="text" id="coupon_code" placeholder="أدخل كود الخصم إن وجد"></div>
    </div>

    <div class="summary-details">
        <div style="display:flex; justify-content:space-between; opacity:0.8; margin-bottom:10px;"><span>المشتريات:</span> <span id="subtotal">0</span> ج.م</div>
        <div style="display:flex; justify-content:space-between; opacity:0.8;"><span>التوصيل:</span> <span id="ship_cost">30</span> ج.م</div>
        <div class="total-line"><span>الإجمالي:</span> <span><span id="total_amount">0</span> ج.م</span></div>
        <button id="submit-btn" onclick="submitOrder()" class="checkout-btn">تأكيد الطلب</button>
    </div>
</div>

<script>
    const VALID_COUPONS = ["LEIL2026"];
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxtSddVoY6wFgPE-_n97JypH4pFdj-hf5rm1UedqMFboa6DFhDbnMMlU2U7rkVKuUb4/exec";

    fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
            function setupDropdown(id) {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.dropdown').forEach(d => { if(d !== el) d.classList.remove('active'); });
                        this.classList.toggle('active');
                    });
                }
            }
            setupDropdown('makhmariatToggle'); setupDropdown('splashToggle'); setupDropdown('lipBalmToggle');
            updateCartCount();
        });

    document.addEventListener('click', function() { document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active')); });

    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        let sub = 0;
        Object.keys(cart).forEach(key => {
            let itemData = cart[key];
            let q = typeof itemData === 'object' ? itemData.qty : itemData;
            let p = typeof itemData === 'object' ? itemData.price : 30;
            let img = typeof itemData === 'object' && itemData.img ? itemData.img : '';
            
            sub += p * q;
            list.innerHTML += `
            <div class="cart-item">
                <div class="item-info">
                    <img src="${img}" class="item-img" onerror="this.style.display='none'">
                    <div class="item-text">
                        <h3>${key}</h3>
                        <p>${p} ج.م</p>
                    </div>
                </div>
                <div class="qty-controls">
                    <button class="qty-btn" onclick="editQty('${key}', 1)">+</button>
                    <span class="qty-val">${q}</span>
                    <button class="qty-btn" onclick="editQty('${key}', -1)">-</button>
                </div>
            </div>`;
        });
        document.getElementById('subtotal').innerText = sub;
        updateTotal();
    }

    function editQty(k, d) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        if (typeof cart[k] === 'object') { cart[k].qty += d; if(cart[k].qty <= 0) delete cart[k]; }
        else { cart[k] = (cart[k] || 0) + d; if(cart[k] <= 0) delete cart[k]; }
        localStorage.setItem('leilCart', JSON.stringify(cart));
        renderCart();
    }

    function updateTotal() {
        const sub = parseInt(document.getElementById('subtotal').innerText) || 0;
        const ship = parseInt(document.getElementById('cust_city').value) || 0;
        document.getElementById('ship_cost').innerText = ship;
        document.getElementById('total_amount').innerText = sub + ship;
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const countEl = document.getElementById('cart-count');
        if(countEl) countEl.innerText = Object.values(cart).reduce((a, b) => a + (typeof b === 'object' ? b.qty : b), 0);
    }

    function submitOrder() {
        const name = document.getElementById('cust_name').value;
        const phone = document.getElementById('cust_phone').value;
        const address = document.getElementById('cust_address').value;
        const city = document.getElementById('cust_city').options[document.getElementById('cust_city').selectedIndex].text;
        const total = document.getElementById('total_amount').innerText;
        const couponInput = document.getElementById('coupon_code').value.trim();
        
        if(!name || !phone || !address) return alert("من فضلك أكمل البيانات");
        
        if (couponInput !== "" && !VALID_COUPONS.includes(couponInput.toUpperCase())) {
            alert("كود الخصم غير صحيح، سيتم إزالته لتتمكن من إتمام الطلب.");
            document.getElementById('coupon_code').value = ""; 
            return; 
        }
        
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let orderString = Object.keys(cart).map(k => `${k} (${typeof cart[k] === 'object' ? cart[k].qty : cart[k]})`).join(' | ');

        const finalUrl = `${SHEET_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&city=${encodeURIComponent(city)}&address=${encodeURIComponent(address)}&order=${encodeURIComponent(orderString)}&total=${encodeURIComponent(total + " ج.م")}&coupon=${encodeURIComponent(couponInput)}`;
        
        document.getElementById('submit-btn').innerText = "جاري الحفظ...";
        fetch(finalUrl, { method: 'POST', mode: 'no-cors' })
        .then(() => { 
            localStorage.removeItem('leilCart'); 
            window.location.href = "thankyou.html";
        })
        .catch(() => { 
            localStorage.removeItem('leilCart'); 
            window.location.href = "thankyou.html";
        });
    }
    window.onload = renderCart;
</script>
</body>
</html>
