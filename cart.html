<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); min-height: 100vh; }

        header {
            background: var(--bg); padding: 15px 4%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 1px; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px;
            border-radius: 5px;
        }

        .item-info h3 { font-size: 18px; margin-bottom: 5px; }
        .item-price-unit { opacity: 0.6; font-size: 14px; }
        
        .item-actions { display: flex; align-items: center; gap: 20px; }
        .qty-controls { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .qty-btn { background: white; color: black; border: none; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        .qty-val { padding: 0 12px; font-weight: 700; }
        .item-total { font-weight: 700; min-width: 70px; text-align: left; }
        .remove-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 16px; margin-right: 10px; }

        /* فورم بيانات العميل */
        .checkout-form {
            background: rgba(255,255,255,0.03); padding: 25px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        .checkout-form h3 { margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid var(--main); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        .input-group input, .input-group textarea {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 5px;
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--main); background: rgba(255,255,255,0.1); }

        .cart-summary { margin-top: 30px; text-align: center; }
        .total-price { font-size: 26px; font-weight: 700; margin-bottom: 20px; }

        .checkout-btn {
            display: block; width: 100%; padding: 18px; background: #25D366;
            color: white; text-decoration: none; font-weight: 700; font-size: 18px;
            border-radius: 5px; transition: 0.3s; border: none; cursor: pointer;
        }
        .checkout-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        .empty-cart { text-align: center; padding: 50px; display: none; }
        .back-store { display: inline-block; margin-top: 20px; color: var(--main); text-decoration: none; }

        @media (max-width: 600px) {
            .cart-item { flex-direction: column; gap: 15px; }
            .item-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <a href="index.html" style="text-decoration:none; font-size: 14px; opacity: 0.7;">← العودة للمتجر</a>
</header>

<div class="cart-container">
    <h1>سلة المشتريات</h1>

    <div id="cart-content">
        <div id="items-list"></div>

        <div class="checkout-form">
            <h3>بيانات الشحن</h3>
            <div class="input-group">
                <label>الاسم بالكامل</label>
                <input type="text" id="cust-name" placeholder="أدخل اسمك" required>
            </div>
            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="cust-phone" placeholder="رقم الواتساب" required>
            </div>
            <div class="input-group">
                <label>العنوان بالتفصيل</label>
                <textarea id="cust-address" rows="3" placeholder="المحافظة، المدينة، الشارع..." required></textarea>
            </div>
        </div>

        <div class="cart-summary">
            <div class="total-price">الإجمالي: <span id="total-amount">0</span> ج.م</div>
            <button onclick="submitOrder()" class="checkout-btn">
                <i class="fab fa-whatsapp"></i> إرسال الطلب وتأكيده
            </button>
        </div>
    </div>

    <div class="empty-cart" id="empty-msg">
        <i class="fas fa-shopping-basket" style="font-size: 50px; opacity: 0.2;"></i>
        <p style="margin-top:20px;">سلتك فارغة</p>
        <a href="index.html" class="back-store">تسوق الآن</a>
    </div>
</div>

<script>
    const prices = { "3 جرام": 30, "5 جرام": 50, "10 جرام": 70, "Pinky Edition": 80 };

    function loadCart() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const list = document.getElementById('items-list');
        const content = document.getElementById('cart-content');
        const empty = document.getElementById('empty-msg');
        list.innerHTML = '';
        let total = 0;
        let keys = Object.keys(cart);

        if (keys.length === 0) {
            content.style.display = 'none'; empty.style.display = 'block'; return;
        } else {
            content.style.display = 'block'; empty.style.display = 'none';
        }

        keys.forEach(key => {
            let qty = cart[key];
            let size = key.includes("Pinky Edition") ? "Pinky Edition" : (key.split(' - ')[1] || "3 جرام");
            let unitPrice = prices[size] || 30;
            let itemTotal = unitPrice * qty;
            total += itemTotal;

            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-info"><h3>${key}</h3><p class="item-price-unit">${unitPrice} ج.م</p></div>
                    <div class="item-actions">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty('${key}', 1)">+</button>
                            <div class="qty-val">${qty}</div>
                            <button class="qty-btn" onclick="updateQty('${key}', -1)">-</button>
                        </div>
                        <div class="item-total">${itemTotal} ج.م</div>
                        <button class="remove-btn" onclick="removeItem('${key}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        });
        document.getElementById('total-amount').innerText = total;
    }

    function updateQty(key, change) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        cart[key] = (cart[key] || 0) + change;
        if (cart[key] <= 0) delete cart[key];
        localStorage.setItem('leilCart', JSON.stringify(cart));
        loadCart();
    }

    function removeItem(key) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        delete cart[key];
        localStorage.setItem('leilCart', JSON.stringify(cart));
        loadCart();
    }

    function submitOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const address = document.getElementById('cust-address').value;

        if(!name || !phone || !address) { alert("من فضلك أكمل بيانات الشحن أولاً"); return; }

        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = document.getElementById('total-amount').innerText;
        
        let message = `*طلب جديد من ليل*%0A`;
        message += `--------------------------%0A`;
        message += `*الاسم:* ${name}%0A`;
        message += `*الهاتف:* ${phone}%0A`;
        message += `*العنوان:* ${address}%0A`;
        message += `--------------------------%0A`;
        message += `*المنتجات:*%0A`;
        
        Object.keys(cart).forEach(key => {
            message += `- ${key} (العدد: ${cart[key]})%0A`;
        });
        
        message += `--------------------------%0A`;
        message += `*الإجمالي النهائي: ${total} ج.م*`;

        // فتح واتساب
        window.open(`https://wa.me/201037322374?text=${message}`, '_blank');

        // ملاحظة: للإرسال للإيميل أو الشيت، استخدم كود EmailJS اللي عملناه في صفحة التواصل هنا برضه
    }

    window.onload = loadCart;
</script>
</body>
</html>
