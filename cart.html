<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); min-height: 100vh; }

        header {
            background: var(--bg); padding: 15px 4%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo { font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; }

        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 1px; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px;
            border-radius: 5px;
        }

        .item-info h3 { font-size: 18px; margin-bottom: 5px; color: white; }
        .item-price-unit { opacity: 0.6; font-size: 14px; color: white !important; }
        
        .item-actions { display: flex; align-items: center; gap: 25px; }

        /* أزرار التحكم في الكمية داخل السلة */
        .qty-controls {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
        }
        .qty-btn {
            background: white; color: black; border: none;
            width: 35px; height: 35px; cursor: pointer;
            font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-val { padding: 0 15px; font-weight: 700; font-size: 16px; }

        .item-total { font-weight: 700; font-size: 18px; color: white !important; min-width: 80px; text-align: left; }
        
        .remove-btn { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 18px; margin-right: 10px; }

        .cart-summary {
            background: rgba(0,0,0,0.2); padding: 30px;
            border-top: 2px solid var(--main); text-align: center; margin-top: 20px;
        }
        .total-price { font-size: 28px; font-weight: 700; margin-bottom: 25px; color: white; }
        .total-price span { color: white; } /* السعر النهائي بالأبيض */

        .checkout-btn {
            display: block; width: 100%; padding: 18px; background: #25D366;
            color: white; text-decoration: none; font-weight: 700; font-size: 18px;
            border-radius: 5px; transition: 0.3s;
        }
        .checkout-btn:hover { filter: brightness(1.1); }
        
        .empty-cart { text-align: center; padding: 50px; display: none; }
        .back-store { display: inline-block; margin-top: 20px; color: var(--main); text-decoration: none; }

        @media (max-width: 600px) {
            .cart-item { flex-direction: column; gap: 15px; }
            .item-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <a href="index.html" style="text-decoration:none; font-size: 14px; opacity: 0.7;">← العودة للمتجر</a>
</header>

<div class="cart-container">
    <h1>سلة المشتريات</h1>

    <div id="cart-content">
        <div id="items-list"></div>

        <div class="cart-summary">
            <div class="total-price">الإجمالي: <span id="total-amount">0</span> ج.م</div>
            <a href="#" onclick="sendToWhatsApp()" class="checkout-btn">
                <i class="fab fa-whatsapp"></i> إتمام الطلب عبر واتساب
            </a>
        </div>
    </div>

    <div class="empty-cart" id="empty-msg">
        <i class="fas fa-shopping-basket" style="font-size: 50px; opacity: 0.2;"></i>
        <p style="margin-top:20px;">سلتك فارغة حالياً</p>
        <a href="index.html" class="back-store">ابدأ التسوق من هنا</a>
    </div>
</div>

<script>
    const prices = {
        "3 جرام": 30,
        "5 جرام": 50,
        "10 جرام": 70,
        "Pinky Edition": 80
    };

    function loadCart() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const list = document.getElementById('items-list');
        const content = document.getElementById('cart-content');
        const empty = document.getElementById('empty-msg');
        
        list.innerHTML = '';
        let total = 0;
        let keys = Object.keys(cart);

        if (keys.length === 0) {
            content.style.display = 'none';
            empty.style.display = 'block';
            return;
        } else {
            content.style.display = 'block';
            empty.style.display = 'none';
        }

        keys.forEach(key => {
            let qty = cart[key];
            let size = key.includes("Pinky Edition") ? "Pinky Edition" : (key.split(' - ')[1] || "3 جرام");
            let unitPrice = prices[size] || 30;
            let itemTotal = unitPrice * qty;
            total += itemTotal;

            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <h3>${key}</h3>
                        <p class="item-price-unit">${unitPrice} ج.م للقطعة</p>
                    </div>
                    <div class="item-actions">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQty('${key}', 1)">+</button>
                            <div class="qty-val">${qty}</div>
                            <button class="qty-btn" onclick="updateQty('${key}', -1)">-</button>
                        </div>
                        <div class="item-total">${itemTotal} ج.م</div>
                        <button class="remove-btn" onclick="removeItem('${key}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        });

        document.getElementById('total-amount').innerText = total;
    }

    function updateQty(key, change) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        cart[key] = (cart[key] || 0) + change;
        
        if (cart[key] <= 0) {
            delete cart[key];
        }
        
        localStorage.setItem('leilCart', JSON.stringify(cart));
        loadCart();
    }

    function removeItem(key) {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        delete cart[key];
        localStorage.setItem('leilCart', JSON.stringify(cart));
        loadCart();
    }

    function sendToWhatsApp() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let total = document.getElementById('total-amount').innerText;
        let message = "طلب جديد من موقع ليل:%0A%0A";
        
        Object.keys(cart).forEach(key => {
            message += `- ${key} (الكمية: ${cart[key]})%0A`;
        });
        
        message += `%0A*الإجمالي النهائي: ${total} ج.م*`;
        window.open(`https://wa.me/201037322374?text=${message}`, '_blank');
    }

    window.onload = loadCart;
</script>

</body>
</html>
