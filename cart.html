<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | ليل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --main: #600a1c; --bg: #3d0000; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; color: white; }
        body { background: var(--bg); min-height: 100vh; padding-bottom: 50px; }
        header { background: var(--bg); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-family: 'Noto Nastaliq Urdu', serif !important; font-size: 22px; text-decoration: none; color: white; }
        .cart-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 700; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; border-radius: 5px; }
        .item-info h3 { font-size: 18px; }
        .item-actions { display: flex; align-items: center; gap: 20px; }
        .qty-controls { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .qty-btn { background: white; color: black; border: none; width: 30px; height: 30px; cursor: pointer; font-weight: bold; }
        .qty-val { padding: 0 12px; font-weight: 700; }
        .remove-btn { background: none; border: none; color: #ff4444; cursor: pointer; }
        .checkout-form { background: rgba(255,255,255,0.03); padding: 25px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); margin-top: 30px; }
        .input-group { margin-bottom: 15px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; color: white; text-align: right; }
        .summary-details { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 5px; }
        .total-line { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 24px; font-weight: 700; }
        .checkout-btn { display: block; width: 100%; padding: 18px; background: var(--main); color: white; font-weight: 700; font-size: 18px; border-radius: 5px; border: none; cursor: pointer; margin-top: 20px; }
        .checkout-btn:disabled { background: #555; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ليل</a>
    <a href="index.html" style="text-decoration:none; font-size: 14px; opacity: 0.7;">← العودة للمتجر</a>
</header>

<div class="cart-container">
    <h1>سلة المشتريات</h1>
    <div id="cart-content">
        <div id="items-list"></div>
        <div class="checkout-form">
            <h3>بيانات الشحن</h3>
            <div class="input-group"><label>الاسم</label><input type="text" id="cust_name" required></div>
            <div class="input-group"><label>رقم الهاتف</label><input type="tel" id="cust_phone" required></div>
            <div class="input-group">
                <label>المحافظة</label>
                <select id="cust_city" onchange="updateShipping()">
                    <option value="30">الإسماعيلية</option>
                    <option value="100">القاهرة</option>
                    <option value="100">باقي المحافظات</option>
                </select>
            </div>
            <div class="input-group"><label>العنوان بالتفصيل</label><textarea id="cust_address" required></textarea></div>
        </div>
        <div class="summary-details">
            <div class="total-line"><span>الإجمالي:</span> <span id="total_amount">0</span> ج.م</div>
            <button id="submit-btn" onclick="submitOrder()" class="checkout-btn">إتمام الطلب الآن</button>
        </div>
    </div>
</div>

<script>
    (function(){
        // تأكد إن الـ Key ده هو اللي في حسابك في EmailJS -> Account -> Public Key
        emailjs.init("aqVLt2xtoeggqTEMi"); 
    })();

    const prices = { "3 جرام": 30, "5 جرام": 50, "10 جرام": 70, "Pinky Edition": 80 };

    function loadCart() {
        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        const list = document.getElementById('items-list');
        list.innerHTML = '';
        let subtotal = 0;
        Object.keys(cart).forEach(key => {
            let size = key.includes("Pinky Edition") ? "Pinky Edition" : (key.split(' - ')[1] || "3 جرام");
            subtotal += (prices[size] || 30) * cart[key];
            list.innerHTML += `<div class="cart-item"><h3>${key}</h3><span>${cart[key]} قطعة</span></div>`;
        });
        document.getElementById('total_amount').innerText = subtotal + parseInt(document.getElementById('cust_city').value);
    }

    function updateShipping() { loadCart(); }

    function submitOrder() {
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('cust_name').value;
        const phone = document.getElementById('cust_phone').value;
        const address = document.getElementById('cust_address').value;
        const city = document.getElementById('cust_city').options[document.getElementById('cust_city').selectedIndex].text;

        if(!name || !phone || !address) { alert("أكمل البيانات"); return; }

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";

        let cart = JSON.parse(localStorage.getItem('leilCart') || '{}');
        let productsString = Object.keys(cart).map(key => `${key} (${cart[key]})`).join(', ');

        const templateParams = {
            cust_name: name,
            cust_phone: phone,
            cust_city: city,
            cust_address: address,
            products: productsString,
            total_price: document.getElementById('total_amount').innerText
        };

        // استخدم service_default و template_leil_order
        emailjs.send('service_default', 'template_leil_order', templateParams)
            .then(() => {
                alert("تم استلام طلبك!");
                localStorage.removeItem('leilCart');
                window.location.href = "index.html";
            }, (err) => {
                alert("خطأ: " + JSON.stringify(err)); // ده هيقولك ليه بيفشل بالظبط
                btn.disabled = false;
                btn.innerText = "إتمام الطلب الآن";
            });
    }
    window.onload = loadCart;
</script>
</body>
</html>
